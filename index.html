<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <meta name="description" content="説明">
    <meta name="keywords" content="キーワード">
    <!-- 必須タグ -->
    <!-- og:title : 表示させるページタイトルを指定 -->
    <meta property="og:title" content="">
    <!-- og:type : website/blog/article/videoなどページの種類を指定 -->
    <meta property="og:type" content="website">
    <!-- og:image : サムネイルとして表示させる画像URLを絶対パスとして指定 -->
    <meta property="og:image" content="">
    <!-- og:url : ページのURLを絶対パスで指定 -->
    <meta property="og:url" content="">

    <!-- 任意タグ -->
    <!-- og:description : ページの説明文を指定 -->
    <meta property="og:description" content="">
    <!-- og:site_name : サイト名を指定 -->
    <meta property="og:site_name" content="Zunbea portfolio">
    <!-- og:locale : サポートしている言語を指定 -->
    <meta property="og:locale" content="japanese">
    <!-- twitter:card : 表示カードの種類を指定 -->
    <meta name="twitter:card" content="Summary with Large Image">
    <!-- twitter:site : ツイッターのアカウント名を「@アカウント名」の形式で指定 -->
    <meta name="twitter:site" content="@Zunbea_study">
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/style.css">
  </head>
  <body>
    <div class="container">
      <!-- header -->
      <header class="header"></header>

      <!-- main -->
      <main class="main"></main>

      <!-- footer -->
      <footer class="footer"></footer>
    </div>
  </body>
</html>
